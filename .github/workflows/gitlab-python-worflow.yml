# This workflow handles linting, testing, and SonarQube scanning for the PODPAC repository.
name: Python Workflow

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.7"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools && pip install .[devall]

      - name: Run black format checks
        run: black --check --diff podpac > black-report.txt  || true # For now pass even if files need formatting

      - name: Artifact black report
        uses: actions/upload-artifact@v4
        with:
          name: black-report
          path: black-report.txt
          retention-days: 1

  testing:
    name: Testing
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.7"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools && pip install .[devall]

      - name: Run pytest with coverage
        run: |
          coverage run --branch \
          -m pytest -m "not integration" --continue-on-collection-errors || \
          { echo "WARNING: Some tests have failed. (Temporarily ignored)"; true; }
          coverage xml -o coverage.xml

      - name: Run doc tests
        run: |
          cd doc && ./test-docs.sh && cd .. || \
          { echo "WARNING: Some document tests have failed. (Temporarily ignored)"; true; }

      - name: Artifact coverage document
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 1

  sonarqube_scan:
    name: SonarQube Scan
    needs: [testing]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
